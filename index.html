<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Database</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
<style>
:root{ --bg:#050505; --card:#0d0d0d; --text:#00ff41; --main:#00ff41; }
body{ margin:0; font-family:'Cairo',sans-serif; background:var(--bg); color:var(--text); }
.support-btn { position: fixed; top: 15px; left: 15px; color: var(--text); z-index: 1000; }
.support-btn svg { width: 25px; height: 25px; fill: currentColor; }
.header{ padding:20px; background:var(--card); border-bottom: 1px solid var(--main); text-align:center; }
h1 { font-family: 'Fira Code', monospace !important; font-size: 1.5rem; margin: 0; color: var(--main); }
.search{ width:100%; max-width:400px; padding:10px; border-radius:5px; border:1px solid var(--main); background:#000; color:var(--main); font-family: 'Fira Code', monospace; margin-top:10px; }
.container{ max-width:600px; margin:auto; padding:10px; }
.card{ background:var(--card); margin-bottom:15px; padding:15px; border: 1px solid #1a1a1a; border-radius:8px; cursor:pointer; }
.card img { width: 100%; max-height: 180px; object-fit: cover; border-radius: 5px; margin-bottom: 10px; border: 1px solid #008f11; }
.title{ font-family: 'Fira Code', monospace !important; font-weight:700; font-size:18px; margin-bottom:5px; }
.desc{ color:#888; font-size:14px; }
.ad { margin: 20px 0; text-align: center; }
</style>
</head>
<body>

<a href="mailto:oxmokes@gmail.com" class="support-btn"><svg viewBox="0 0 24 24"><path d="M12 1c-4.97 0-9 4.03-9 9v7c0 1.66 1.34 3 3 3h3v-8H5v-2c0-3.87 3.13-7 7-7s7 3.13 7 7v2h-4v8h3c1.66 0 3-1.34 3-3v-7c0-4.97-4.03-9-9-9z"/></svg></a>

<div class="header">
  <h1>[SYSTEM_DATABASE]</h1>
  <input class="search" placeholder="Root@Database:~# Search..." oninput="search(this.value)">
</div>
<div class="container" id="tools"></div>

<script>
const listFile = "مقالات.txt";
const folder = "Articles/";
const adLink = "https://www.effectivegatecpm.com/d6mid86v?key=90c984c8fd10e21cd01541eb4207aa2c";
const container = document.getElementById("tools");
let allTools = [];

// إعلانات الضغط والنقل
document.body.addEventListener("click", () => { window.open(adLink, '_blank'); }, {once: true});
setInterval(() => { window.open(adLink, '_blank'); }, 30000);

fetch(listFile).then(r => r.text()).then(text => {
    const files = text.split("\n").map(f => f.trim().replace(/^•/, '')).filter(f => f !== "");
    files.forEach(fileName => {
        fetch(folder + fileName).then(r => r.text()).then(data => {
            let lines = data.split("\n");
            let title = lines[0].replace(/\*/g,"");
            let imgMatch = data.match(/\(img\)(.*?)\(img\)/);
            let desc = data.replace(/\(img\).*?\(img\)/g, "").replace(/\*/g,"").substring(title.length, 150) + "...";
            allTools.push({file: fileName, title, desc, img: imgMatch ? imgMatch[1] : null});
            render(allTools);
        });
    });
});

function render(list) {
    container.innerHTML = "";
    list.forEach((s, index) => {
        let card = document.createElement("div");
        card.className = "card";
        card.onclick = () => location.href = "article.html?file=" + s.file;
        card.innerHTML = `${s.img ? `<img src="${s.img}">`:''}<div class="title">> ${s.title}</div><div class="desc">${s.desc}</div>`;
        container.appendChild(card);
        if((index+1) % 2 === 0) {
            let ad = document.createElement("div"); ad.className = "ad";
            ad.innerHTML = `<script>atOptions={'key':'dcff8a2cffdf0642c627a5bacf3a04fd','format':'iframe','height':60,'width':320};<\/script><script src="https://www.highperformanceformat.com/dcff8a2cffdf0642c627a5bacf3a04fd/invoke.js"><\/script>`;
            container.appendChild(ad);
        }
    });
}
function search(v) { render(allTools.filter(s => s.title.toLowerCase().includes(v.toLowerCase()))); }
</script>
</body>
</html>
